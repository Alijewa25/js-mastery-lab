<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Mastery - Full Stack</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div class="container">
        <div id="auth-section">
            <h2>Giriş / Qeydiyyat</h2>
            <input type="text" id="username" placeholder="İstifadəçi adı">
            <input type="password" id="password" placeholder="Şifrə">
            <div class="auth-btns">
                <button id="login-btn">Giriş</button>
                <button id="register-btn">Qeydiyyat</button>
            </div>
        </div>

        <hr>

        <div id="main-app">
            <h2>Mənim Tasklarım</h2>
            <div class="control-panel">
                <input type="text" id="item-input" placeholder="Yeni tapşırıq yaz...">
                <button id="add-btn">Əlavə et</button>
            </div>
            <ul id="item-list"></ul>
            <button id="clear-all">Hamısını sil</button>
        </div>
    </div>

    <script src="scripts/app.js"></script>
</body>
</html>
